version: '3.8'

services:
  gateway:
    build: ./gateway
    container_name: api_gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - USERS_SERVICE_URL=http://users-service:5001
      - ORDERS_SERVICE_URL=http://orders-service:5002
    depends_on:
      - users-service
      - orders-service

  users-service:
    build: ./services/users-service
    container_name: users_service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - LATENCY_MIN=50
      - LATENCY_MAX=2000
      - FAILURE_RATE=0.0

  orders-service:
    build: ./services/orders-service
    container_name: orders_service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - LATENCY_MIN=50
      - LATENCY_MAX=2000
      - FAILURE_RATE=0.0
